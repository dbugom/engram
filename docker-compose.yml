services:
  # LOCAL server — OPEN (no auth), bound to localhost. Used by local Claude Code
  # and the auto-capture hook. This is your original, frictionless local setup.
  openbrain-mcp:
    build: .
    image: openbrain-mcp
    container_name: openbrain-mcp
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54422/postgres
      OLLAMA_URL: http://host.docker.internal:11434
      EMBED_MODEL: qwen3-embedding:4b
      EXTRACT_MODEL: qwen3:4b
      EMBED_DIM: "2560"
      ENABLE_EXTRACTION: "true"
      NEAR_DUP_THRESHOLD: "0.95"
      REVIEW_DUP_THRESHOLD: "0.90"
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # REMOTE server — Google OAuth on /mcp (for claude.ai) + bearer token on the
  # REST API. Same image + DB. NOT published to a host port; only the cloudflared
  # sidecar reaches it over the compose network. Opt-in via the "tunnel" profile.
  openbrain-oauth:
    image: openbrain-mcp
    container_name: openbrain-oauth
    profiles: ["tunnel"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:54422/postgres
      OLLAMA_URL: http://host.docker.internal:11434
      EMBED_MODEL: qwen3-embedding:4b
      EXTRACT_MODEL: qwen3:4b
      EMBED_DIM: "2560"
      ENABLE_EXTRACTION: "true"
      NEAR_DUP_THRESHOLD: "0.95"
      REVIEW_DUP_THRESHOLD: "0.90"
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      OAUTH_BASE_URL: ${OAUTH_BASE_URL:-https://openbrain.example.com}
      OPENBRAIN_TOKEN: ${OPENBRAIN_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Dashboard-managed Cloudflare tunnel -> routes the public hostname to the
  # OAuth server (openbrain-oauth:8000). Opt-in via the "tunnel" profile.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: openbrain-tunnel
    profiles: ["tunnel"]
    # http2 (not the default quic/UDP) — more reliable on restrictive networks;
    # avoids the "datagram manager" QUIC drops that cause intermittent outages.
    command: tunnel --no-autoupdate --protocol http2 run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN:-}
    depends_on:
      - openbrain-oauth
    restart: unless-stopped
